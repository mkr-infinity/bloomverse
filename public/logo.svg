<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff2d55" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff2d55" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff6b2d"/>
    </linearGradient>
    <linearGradient id="petalGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="crackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6b2d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0f" stroke="#1a1a25" stroke-width="2"/>
  
  <!-- Outer energy ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#petalGrad2)" stroke-width="1.5" stroke-dasharray="8 12" opacity="0.6"/>
  
  <!-- Multiverse crack lines -->
  <g filter="url(#glow)" opacity="0.7">
    <path d="M256 56 L260 120 L250 130 L258 180" fill="none" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M256 456 L252 390 L262 380 L254 330" fill="none" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M56 256 L120 252 L130 262 L180 254" fill="none" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M456 256 L390 260 L380 250 L330 258" fill="none" stroke="url(#crackGrad)" stroke-width="2" stroke-linecap="round"/>
    <path d="M120 120 L160 155 L155 165 L195 195" fill="none" stroke="url(#crackGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M392 392 L355 360 L360 348 L320 320" fill="none" stroke="url(#crackGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M392 120 L358 155 L362 165 L320 195" fill="none" stroke="url(#crackGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M120 392 L155 358 L165 362 L195 320" fill="none" stroke="url(#crackGrad)" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Middle orbit ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.4" stroke-dasharray="4 8"/>
  
  <!-- Bloom petals -->
  <g filter="url(#glow)">
    <!-- Top petal -->
    <path d="M256 160 Q280 200 256 240 Q232 200 256 160" fill="url(#petalGrad1)" opacity="0.9"/>
    <!-- Bottom petal -->
    <path d="M256 352 Q280 312 256 272 Q232 312 256 352" fill="url(#petalGrad1)" opacity="0.9"/>
    <!-- Left petal -->
    <path d="M160 256 Q200 232 240 256 Q200 280 160 256" fill="url(#petalGrad2)" opacity="0.9"/>
    <!-- Right petal -->
    <path d="M352 256 Q312 232 272 256 Q312 280 352 256" fill="url(#petalGrad2)" opacity="0.9"/>
    <!-- Diagonal petals -->
    <path d="M185 185 Q215 210 220 240 Q195 215 185 185" fill="url(#petalGrad1)" opacity="0.6"/>
    <path d="M327 185 Q297 210 292 240 Q317 215 327 185" fill="url(#petalGrad2)" opacity="0.6"/>
    <path d="M185 327 Q215 297 240 292 Q215 317 185 327" fill="url(#petalGrad2)" opacity="0.6"/>
    <path d="M327 327 Q297 297 272 292 Q297 317 327 327" fill="url(#petalGrad1)" opacity="0.6"/>
  </g>
  
  <!-- Central core -->
  <circle cx="256" cy="256" r="35" fill="url(#coreGlow)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#ff2d55"/>
  <circle cx="256" cy="256" r="12" fill="#0a0a0f"/>
  <circle cx="256" cy="256" r="6" fill="#00ff88" filter="url(#glow)"/>
  
  <!-- Inner energy dots -->
  <circle cx="256" cy="220" r="3" fill="#00ff88" opacity="0.8"/>
  <circle cx="256" cy="292" r="3" fill="#00ff88" opacity="0.8"/>
  <circle cx="220" cy="256" r="3" fill="#ff2d55" opacity="0.8"/>
  <circle cx="292" cy="256" r="3" fill="#ff2d55" opacity="0.8"/>
</svg>
