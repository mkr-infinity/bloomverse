<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#f0c96b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0c96b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e0"/>
      <stop offset="40%" stop-color="#f0c96b"/>
      <stop offset="100%" stop-color="#d39854"/>
    </radialGradient>
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c96b"/>
      <stop offset="100%" stop-color="#e8a46b"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#75b7ca"/>
      <stop offset="100%" stop-color="#5a9ab5"/>
    </linearGradient>
    <linearGradient id="petal3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8764c8"/>
      <stop offset="100%" stop-color="#a47ee8"/>
    </linearGradient>
    <linearGradient id="petal4" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93b95f"/>
      <stop offset="100%" stop-color="#6d9551"/>
    </linearGradient>
    <linearGradient id="petal5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c96b5f"/>
      <stop offset="100%" stop-color="#e88a7a"/>
    </linearGradient>
    <linearGradient id="petal6" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f0c96b"/>
      <stop offset="100%" stop-color="#d4a04a"/>
    </linearGradient>
    <linearGradient id="stem" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#5a8f48"/>
      <stop offset="100%" stop-color="#3d6b2e"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d9551"/>
      <stop offset="100%" stop-color="#4a7a38"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="230" r="200" fill="url(#glow)"/>

  <!-- Outer petals - flower bloom -->
  <g filter="url(#softGlow)" opacity="0.9">
    <!-- Petal 1 - top -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal1)" transform="rotate(0 256 200)" opacity="0.85"/>
    <!-- Petal 2 - top right -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal2)" transform="rotate(60 256 200)" opacity="0.8"/>
    <!-- Petal 3 - bottom right -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal3)" transform="rotate(120 256 200)" opacity="0.8"/>
    <!-- Petal 4 - bottom -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal4)" transform="rotate(180 256 200)" opacity="0.85"/>
    <!-- Petal 5 - bottom left -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal5)" transform="rotate(240 256 200)" opacity="0.8"/>
    <!-- Petal 6 - top left -->
    <ellipse cx="256" cy="140" rx="38" ry="72" fill="url(#petal6)" transform="rotate(300 256 200)" opacity="0.8"/>
  </g>

  <!-- Inner petals - smaller, brighter -->
  <g filter="url(#innerGlow)" opacity="0.95">
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#f0c96b" transform="rotate(30 256 200)" opacity="0.7"/>
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#75b7ca" transform="rotate(90 256 200)" opacity="0.65"/>
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#8764c8" transform="rotate(150 256 200)" opacity="0.65"/>
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#93b95f" transform="rotate(210 256 200)" opacity="0.7"/>
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#c96b5f" transform="rotate(270 256 200)" opacity="0.65"/>
    <ellipse cx="256" cy="165" rx="24" ry="48" fill="#f0c96b" transform="rotate(330 256 200)" opacity="0.7"/>
  </g>

  <!-- Core circle - the world/bloom center -->
  <circle cx="256" cy="200" r="52" fill="url(#coreGlow)" filter="url(#innerGlow)"/>
  <circle cx="256" cy="200" r="44" fill="none" stroke="#fff8e0" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="200" r="38" fill="none" stroke="#f0c96b" stroke-width="1" opacity="0.3"/>

  <!-- World grid lines inside core -->
  <g opacity="0.25" stroke="#fff8e0" stroke-width="0.8" fill="none">
    <ellipse cx="256" cy="200" rx="36" ry="36"/>
    <ellipse cx="256" cy="200" rx="24" ry="36"/>
    <ellipse cx="256" cy="200" rx="12" ry="36"/>
    <line x1="220" y1="200" x2="292" y2="200"/>
    <path d="M 220 188 Q 256 175 292 188"/>
    <path d="M 220 212 Q 256 225 292 212"/>
  </g>

  <!-- Small dots - stars/fireflies -->
  <circle cx="195" cy="155" r="2.5" fill="#f0c96b" opacity="0.8"/>
  <circle cx="310" cy="160" r="2" fill="#75b7ca" opacity="0.7"/>
  <circle cx="215" cy="245" r="2" fill="#93b95f" opacity="0.7"/>
  <circle cx="298" cy="240" r="2.5" fill="#8764c8" opacity="0.65"/>
  <circle cx="175" cy="210" r="1.8" fill="#c96b5f" opacity="0.6"/>
  <circle cx="335" cy="205" r="1.8" fill="#f0c96b" opacity="0.6"/>

  <!-- Stem -->
  <path d="M 256 252 Q 252 310 248 370 Q 245 400 250 440" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Leaves -->
  <path d="M 250 320 Q 220 300 210 310 Q 200 320 230 330 Q 240 332 250 320" fill="url(#leaf)" opacity="0.85"/>
  <path d="M 252 360 Q 282 340 292 350 Q 302 360 272 370 Q 262 372 252 360" fill="url(#leaf)" opacity="0.8"/>
  <path d="M 248 400 Q 218 385 210 395 Q 205 405 228 410 Q 240 412 248 400" fill="url(#leaf)" opacity="0.75"/>

  <!-- Small bud at stem top -->
  <circle cx="256" cy="254" r="6" fill="#5a8f48" opacity="0.7"/>
  <circle cx="256" cy="252" r="4" fill="#6d9551" opacity="0.8"/>

  <!-- Sparkle particles -->
  <g opacity="0.6">
    <circle cx="160" cy="170" r="1.5" fill="#f0c96b"/>
    <circle cx="350" cy="175" r="1.5" fill="#f0c96b"/>
    <circle cx="145" cy="250" r="1" fill="#75b7ca"/>
    <circle cx="365" cy="245" r="1" fill="#8764c8"/>
    <circle cx="180" cy="130" r="1.2" fill="#93b95f"/>
    <circle cx="330" cy="135" r="1.2" fill="#c96b5f"/>
  </g>
</svg>
